name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Install the App Testing Agent CLI
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          TAG=$(gh release list --repo microsoft/app-testing-agent --limit 1 --exclude-drafts --json tagName --jq '.[0].tagName')
          echo "Installing ata $TAG"
          gh release download "$TAG" --repo microsoft/app-testing-agent -p '*.tgz' --dir /tmp/ata-install
          npm install -g /tmp/ata-install/microsoft-app-testing-agent-*.tgz

      - name: Run Playwright tests and upload results
        run: ata run --save-results
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_PAT }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
