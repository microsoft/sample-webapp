<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sample Web App</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav>
    <a href="/" class="logo">SampleApp</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/login">Login</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/feedback">Feedback</a>
    </div>
  </nav>
  <main>
    <h1>Dashboard</h1>
    <div class="dashboard-grid">
      <div class="card">
        <h3>Users</h3>
        <p class="stat" id="user-count">128</p>
      </div>
      <div class="card">
        <h3>Revenue</h3>
        <p class="stat" id="revenue">$12,450</p>
      </div>
      <div class="card">
        <h3>Orders</h3>
        <p class="stat" id="order-count">340</p>
      </div>
    </div>
    <section>
      <h2>Recent Activity</h2>
      <div class="form-group">
        <label for="activity-search">Search activity</label>
        <input type="search" id="activity-search" placeholder="Filter by user or action">
      </div>
      <table id="activity-table">
        <thead>
          <tr><th>User</th><th>Action</th><th>Date</th></tr>
        </thead>
        <tbody>
          <tr><td>Alice</td><td>Created account</td><td>2026-05-14</td></tr>
          <tr><td>Bob</td><td>Placed order</td><td>2026-05-13</td></tr>
          <tr><td>Charlie</td><td>Updated profile</td><td>2026-05-12</td></tr>
        </tbody>
      </table>
      <p id="activity-empty" class="message" hidden>No matching activity found.</p>
    </section>
  </main>
  <script>
    const searchInput = document.getElementById('activity-search');
    const rows = Array.from(document.querySelectorAll('#activity-table tbody tr'));
    const emptyMsg = document.getElementById('activity-empty');
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();
      let visibleCount = 0;
      rows.forEach((row) => {
        const match = row.textContent.toLowerCase().includes(query);
        row.hidden = !match;
        if (match) visibleCount++;
      });
      emptyMsg.hidden = visibleCount !== 0;
    });
  </script>
</body>
</html>
